<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>q movie - الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        /* 🔥🔥 الألوان الأساسية والتصميم العام 🔥🔥 */
        :root {
            --bg-color: #080808;
            --card-color: #141414;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --accent-color: #e50914; 
            --accent-hover: #b8070f;
            --primary-color: #007bff;
            --success-color: #28a745;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            transition: margin-right 0.3s ease;
        }

        /* 🎬 الهيدر (شريط التنقل) الاحترافي */
        header {
            display: flex;
            flex-direction: column; 
            background: rgba(8, 8, 8, 0.85);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px 30px;
        }

        .header-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%; 
            gap: 20px;
        }

        .header-right { display: flex; align-items: center; gap: 15px; flex-grow: 1; }

        #menu-toggle-btn {
            background: none; border: none; color: var(--text-color);
            font-size: 28px; cursor: pointer; transition: 0.3s; padding: 0;
        }
        #menu-toggle-btn:hover { color: var(--accent-color); transform: scale(1.1); }

        .logo {
            font-size: 2.2em; font-weight: 800; color: var(--accent-color);
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(229, 9, 20, 0.5);
            margin: 0; padding: 0;
        }

        /* 🔥 شريط البحث المدمج */
        .search-container { flex-grow: 2; max-width: 500px; position: relative; }
        #search-input {
            width: 100%; padding: 12px 20px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-color); font-size: 15px;
            font-family: inherit; transition: all 0.3s ease;
        }
        #search-input:focus {
            outline: none; background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3); box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }

        /* 🎬 أزرار الهيدر */
        .header-actions { display: flex; gap: 12px; align-items: center; }

        .header-action-btn {
            padding: 9px 18px; border-radius: 30px; font-size: 14px; font-weight: 700;
            font-family: inherit; cursor: pointer; text-decoration: none;
            transition: all 0.3s ease; white-space: nowrap; border: none;
        }
        #contact-btn { background: rgba(40, 167, 69, 0.15); color: var(--success-color); border: 1px solid var(--success-color); }
        #contact-btn:hover { background: var(--success-color); color: white; box-shadow: 0 0 15px rgba(40, 167, 69, 0.4); }
        
        #logout-btn { background: transparent; color: var(--text-muted); border: 1px solid #444; }
        #logout-btn:hover { background: var(--accent-color); color: white; border-color: var(--accent-color); }

        /* ستايل زر لوحة التحكم الذي يظهر للآدمن */
        .admin-controls a {
            background: rgba(0, 123, 255, 0.15); color: var(--primary-color); border: 1px solid var(--primary-color);
            padding: 9px 18px; border-radius: 30px; font-size: 14px; font-weight: 700; text-decoration: none; transition: 0.3s;
        }
        .admin-controls a:hover { background: var(--primary-color); color: white; box-shadow: 0 0 15px rgba(0, 123, 255, 0.4); }

        /* 🎬 القائمة الجانبية */
        #sidebar {
            height: 100vh; width: 0; position: fixed; top: 0; right: 0;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px);
            z-index: 2000; transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow-x: hidden; border-left: 1px solid rgba(255,255,255,0.05);
        }
        #sidebar.open { width: var(--sidebar-width); }
        body.sidebar-open { margin-right: var(--sidebar-width); overflow: hidden; }

        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h3 { margin: 0; color: var(--text-color); font-size: 1.2em; }
        #close-sidebar-btn { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; transition: 0.3s; }
        #close-sidebar-btn:hover { color: var(--accent-color); transform: rotate(90deg); }

        #sidebar-categories { padding: 15px 0; }
        .sidebar-category-link {
            display: block; padding: 12px 25px; color: var(--text-muted); text-decoration: none;
            font-size: 1.1em; font-weight: 500; transition: all 0.3s; border-right: 3px solid transparent;
        }
        .sidebar-category-link:hover, .sidebar-category-link.active {
            background-color: rgba(255, 255, 255, 0.05); color: var(--text-color); border-right-color: var(--accent-color);
        }

        /* 🎬 محتوى الصفحة */
        main { padding: 0 30px 40px; }

        /* 🔥 البانر الإعلاني (Hero Section) */
        #main-banner {
            display: none; width: 100%; height: 55vh; min-height: 400px;
            border-radius: 20px; margin-top: 20px; text-decoration: none;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            position: relative; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            align-items: flex-end; padding: 40px; transition: transform 0.3s;
        }
        #main-banner:hover { transform: scale(0.99); }
        
        .banner-gradient {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(8,8,8,1) 0%, rgba(8,8,8,0.4) 50%, transparent 100%);
        }
        
        #banner-info { position: relative; z-index: 10; max-width: 600px; }
        #banner-title { font-size: 3em; font-weight: 800; margin: 0 0 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); line-height: 1.2; }
        #banner-description { font-size: 1.1em; color: #ddd; margin: 0 0 20px; line-height: 1.6; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .play-btn-mock { background: var(--accent-color); color: white; padding: 12px 30px; border-radius: 8px; font-weight: bold; font-size: 1.1em; display: inline-block; box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4); }

        /* 🔥 أزرار الفلترة */
        #category-filter {
            display: flex; gap: 12px; margin: 40px 0 25px; overflow-x: auto;
            padding-bottom: 10px; /* لترك مساحة للـ Scroll */
        }
        #category-filter::-webkit-scrollbar { height: 6px; }
        #category-filter::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .category-btn {
            background: rgba(255, 255, 255, 0.05); color: var(--text-color); border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 20px; border-radius: 20px; font-family: inherit; font-size: 15px;
            cursor: pointer; transition: all 0.3s; white-space: nowrap; font-weight: 500;
        }
        .category-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .category-btn.active { background: var(--text-color); color: var(--bg-color); font-weight: 700; border-color: var(--text-color); }

        /* 🎬 شبكة الأفلام والمسلسلات */
        #movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .movie-item {
            position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 2 / 3;
            text-decoration: none; background-color: var(--card-color);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5); transition: all 0.4s ease;
            cursor: pointer;
        }
        .movie-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.8);
            z-index: 2;
        }

        .img-wrapper { width: 100%; height: 100%; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .movie-item:hover .img-wrapper img { transform: scale(1.08); filter: brightness(0.8); }

        /* التراكب (Overlay) للنصوص والتاجات */
        .card-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, transparent 40%, rgba(0,0,0,0.9) 100%);
            padding: 12px; transition: 0.3s;
        }

        .badges-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .badge {
            padding: 4px 10px; border-radius: 6px; font-size: 0.85em; font-weight: bold;
            backdrop-filter: blur(5px); box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        .rating-badge { background: rgba(0, 0, 0, 0.6); color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
        .type-badge.series { background: rgba(40, 167, 69, 0.85); color: white; }
        .type-badge.movie { background: rgba(0, 123, 255, 0.85); color: white; }

        .card-details { transform: translateY(10px); transition: transform 0.3s ease; }
        .movie-item:hover .card-details { transform: translateY(0); }
        
        .category-text { font-size: 0.85em; color: var(--accent-color); font-weight: 700; margin-bottom: 5px; display: block; }
        .card-title { margin: 0; color: white; font-size: 1.1em; font-weight: 700; line-height: 1.4; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }

        #loader { text-align: center; padding: 50px; font-size: 1.5em; color: var(--text-muted); width: 100%; grid-column: 1 / -1; }

        /* 🎬 الموبايل والشاشات الصغيرة */
        @media (max-width: 900px) {
            #main-banner { height: 40vh; min-height: 300px; padding: 25px; }
            #banner-title { font-size: 2em; }
            .play-btn-mock { padding: 8px 20px; font-size: 1em; }
        }

        @media (max-width: 600px) {
             header { padding: 12px 15px; }
             .header-top-row { flex-wrap: wrap; gap: 15px; }
             
             .header-right { width: 100%; justify-content: space-between; }
             .logo { font-size: 1.8em; }
             
             .search-container { width: 100%; order: 3; max-width: 100%; }
             #search-input { padding: 10px 15px; }

             .header-actions { width: 100%; justify-content: center; order: 4; gap: 10px; }
             
             main { padding: 0 15px 20px; }
             #movie-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
             .card-title { font-size: 1em; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <h3>تصفح حسب التصنيف</h3>
            <button id="close-sidebar-btn" onclick="toggleSidebar()">✕</button>
        </div>
        <div id="sidebar-categories"></div>
    </div>

    <main id="main-content">
        <header>
            <div class="header-top-row">
                <div class="header-right">
                    <button id="menu-toggle-btn" onclick="toggleSidebar()">☰</button>
                    <div class="logo">q movie</div>
                </div>

                <div class="search-container">
                    <input type="text" id="search-input" placeholder="ابحث عن فيلم أو مسلسل...">
                </div>
                
                <div class="header-actions">
                    <a href="contact.html" id="contact-btn" class="header-action-btn">تواصل معنا</a> 
                    <div class="admin-controls"></div> <button id="logout-btn" class="header-action-btn">تسجيل خروج</button>
                </div>
            </div>
        </header>

        <a id="main-banner" href="#">
            <div class="banner-gradient"></div>
            <div id="banner-info">
                <h2 id="banner-title"></h2>
                <p id="banner-description"></p>
                <div class="play-btn-mock">▶ شاهد الآن</div>
            </div>
        </a>

        <div id="category-filter"></div>

        <div id="movie-grid"></div>
        <div id="loader">جاري تحميل المحتوى الرائع... 🍿</div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        // ================ (1) إعدادات Firebase ================
        const firebaseConfig = {
            apiKey: "AIzaSyBApoSZ-HXy9kd07tSJfuRdWkJcrbQVYf0", 
            authDomain: "qmove1.firebaseapp.com",
            projectId: "qmove1",
            storageBucket: "qmove1.appspot.com",
            messagingSenderId: "166464805371",
            appId: "1:166464805371:web:d65b0cb8b141e4b894935e"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        const ADMIN_UID = 'rHIJXeazJiMsgAc1HDRO3vzFFV02'; 

        // عناصر التحكم
        const grid = document.getElementById('movie-grid');
        const loader = document.getElementById('loader');
        const searchInput = document.getElementById('search-input');
        const logoutBtn = document.getElementById('logout-btn');
        const adminControls = document.querySelector('.header-actions .admin-controls'); 
        const bannerElement = document.getElementById('main-banner');
        const categoryFilter = document.getElementById('category-filter');
        const sidebar = document.getElementById('sidebar');
        const sidebarCategories = document.getElementById('sidebar-categories');
        const body = document.body;

        let allContent = []; 
        let currentFilter = 'all';

        // دالة فتح وإغلاق القائمة الجانبية
        function toggleSidebar() {
            if (sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                body.classList.remove('sidebar-open');
            } else {
                sidebar.classList.add('open');
                body.classList.add('sidebar-open');
            }
        }

        // ================ (2) جلب وعرض الأفلام والمسلسلات ================
        async function fetchContent() {
            try {
                // جلب الأفلام
                const moviesSnapshot = await db.collection('movies').orderBy('timestamp', 'desc').get();
                const movies = moviesSnapshot.docs.map(doc => ({ id: doc.id, type: 'movie', ...doc.data() }));

                // جلب المسلسلات
                const seriesSnapshot = await db.collection('series').orderBy('timestamp', 'desc').get();
                const series = seriesSnapshot.docs.map(doc => ({ id: doc.id, type: 'series', ...doc.data() }));

                allContent = [...movies, ...series];
                
                if (allContent.length === 0) { loader.textContent = 'لا يوجد محتوى حالياً.'; return; }
                
                allContent.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

                setupBanner(allContent);
                setupCategoryButtons(allContent); 
                setupSidebarCategories(allContent); 

                displayContent(allContent); 
                loader.style.display = 'none';
            } catch (error) { 
                console.error("خطأ بجلب المحتوى: ", error);
                loader.textContent = 'حدث خطأ. يرجى تحديث الصفحة.';
            }
        }
        
        function setupBanner(content) {
            const featuredMovie = content.find(item => item.type === 'movie' && item.isFeatured && item.bannerUrl);

            if (featuredMovie) {
                bannerElement.style.display = 'flex';
                // دمج الصورة مع الجراديانت من خلال CSS مسبقاً، هنا نضع الصورة فقط
                bannerElement.style.backgroundImage = `url('${featuredMovie.bannerUrl}')`;
                bannerElement.href = `./movie.html?id=${featuredMovie.id}`; 
                document.getElementById('banner-title').textContent = featuredMovie.title || 'فيلم مميز';
                document.getElementById('banner-description').textContent = featuredMovie.description || 'شاهد الآن أحدث الأفلام المميزة!';
            } else {
                bannerElement.style.display = 'none'; 
            }
        }
        
        function setupSidebarCategories(content) {
            const categories = new Set(content.map(m => m.category).filter(c => c && c !== 'all'));
            sidebarCategories.innerHTML = '';
            
            const allLink = document.createElement('a');
            allLink.href = '#';
            allLink.className = 'sidebar-category-link active';
            allLink.textContent = 'الكل';
            allLink.onclick = (e) => { e.preventDefault(); handleCategoryFilter(e, 'all', true); };
            sidebarCategories.appendChild(allLink);

            categories.forEach(category => {
                const link = document.createElement('a');
                link.href = '#';
                link.className = 'sidebar-category-link';
                link.textContent = category;
                link.onclick = (e) => { e.preventDefault(); handleCategoryFilter(e, category, true); };
                sidebarCategories.appendChild(link);
            });
        }
        
        function setupCategoryButtons(content) {
            const categories = new Set(content.map(m => m.category).filter(c => c));
            categoryFilter.innerHTML = '<button class="category-btn active" data-category="all">الكل</button>';

            categories.forEach(category => {
                if (category === 'all') return;
                const button = document.createElement('button');
                button.className = 'category-btn';
                button.textContent = category;
                button.dataset.category = category;
                button.onclick = (e) => handleCategoryFilter(e, category, false);
                categoryFilter.appendChild(button);
            });
        }
        
        function handleCategoryFilter(event, category, isSidebar) {
            currentFilter = category;

            const buttons = document.querySelectorAll('.category-btn');
            const links = document.querySelectorAll('.sidebar-category-link');
            
            buttons.forEach(btn => btn.classList.remove('active'));
            links.forEach(link => link.classList.remove('active'));
            
            if (event.target) {
                event.target.classList.add('active');
            } else {
                buttons.forEach(btn => { if (btn.dataset.category === category) btn.classList.add('active'); });
                links.forEach(link => { if (link.textContent.trim() === category || (category === 'all' && link.textContent.trim() === 'الكل')) link.classList.add('active'); });
            }
            
            if (isSidebar) { toggleSidebar(); }
            filterAndDisplayContent();
        }

        function filterAndDisplayContent() {
             const searchTerm = searchInput.value.toLowerCase();
             let filteredContent = allContent;

             if (currentFilter !== 'all') {
                filteredContent = filteredContent.filter(item => item.category === currentFilter);
             }

             if (searchTerm) {
                filteredContent = filteredContent.filter(item => {
                    return item.title.toLowerCase().includes(searchTerm);
                });
             }

             displayContent(filteredContent);
        }

        // 🔥🔥 دالة التصميم الجديد للبطاقات 🔥🔥
        function displayContent(contentList) {
            grid.innerHTML = ''; 
            if (contentList.length === 0) {
                 grid.innerHTML = '<p style="text-align: center; font-size: 1.2em; grid-column: 1/-1; color: #888;">عفواً، لا يوجد محتوى مطابق لبحثك.</p>';
                 return;
            }

            contentList.forEach(item => {
                const itemLink = document.createElement('a');
                itemLink.href = item.type === 'movie' ? `./movie.html?id=${item.id}` : `./series_watch.html?seriesId=${item.id}`;
                itemLink.className = 'movie-item';
                
                const ratingDisplay = item.rating ? `<span class="badge rating-badge">⭐ ${item.rating.toFixed(1)}</span>` : '<div></div>'; // div فارغ للحفاظ على التنسيق
                const typeTag = item.type === 'series' ? `<span class="badge type-badge series">مسلسل</span>` : `<span class="badge type-badge movie">فيلم</span>`;
                const categoryName = item.category ? item.category : 'غير مصنف';

                itemLink.innerHTML = `
                    <div class="img-wrapper">
                        <img src="${item.posterUrl}" alt="${item.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/220x330?text=No+Image';">
                    </div>
                    <div class="card-overlay">
                        <div class="badges-top">
                            ${typeTag}
                            ${ratingDisplay}
                        </div>
                        <div class="card-details">
                            <span class="category-text">${categoryName}</span>
                            <h3 class="card-title">${item.title}</h3>
                        </div>
                    </div>
                `;
                grid.appendChild(itemLink);
            });
        }


        // ================ (3) الحارس الأمني (السكيورتي) ================
        auth.onAuthStateChanged(user => {
            if (user) {
                if (user.uid === ADMIN_UID) {
                    adminControls.innerHTML = `<a href="./admin_control.html" id="admin-panel-btn">لوحة التحكم</a>`;
                }

                fetchContent(); 

                logoutBtn.addEventListener('click', () => {
                    auth.signOut().then(() => {
                        window.location.href = './login.html';
                    });
                });

            } else {
                window.location.href = './login.html';
            }
        });
        
        // ================ (4) برمجة البحث ================
        searchInput.addEventListener('input', filterAndDisplayContent);
    </script>
</body>
</html>
