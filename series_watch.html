<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاهدة المسلسل</title>
    <style>
        :root {
            --bg-color: #0d0d0d; 
            --card-color: #1a1a1a; 
            --text-color: #e0e0e0; 
            --accent-color: #e50914; 
            --primary-color: #007bff;
        }
        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #141414, #000);
            color: var(--text-color);
            padding: 0;
            margin: 0;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        body.loaded { opacity: 1; }
        
        header {
            display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; 
            background-color: var(--card-color); box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }
        .back-btn { font-size: 1.5em; color: #007bff; text-decoration: none; transition: color 0.3s; }
        .back-btn:hover { color: var(--accent-color); }
        #logout-btn { padding: 8px 12px; background-color: var(--accent-color); color: white; border-radius: 5px; cursor: pointer; border: none; }

        main { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        #player-wrapper { display: flex; justify-content: center; margin-bottom: 30px; }
        #player-container {
            width: 100%; max-width: 900px; position: relative; padding-bottom: 56.25%; height: 0; 
            background-color: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
        }

        #server-buttons { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 20px; }
        .server-btn {
            padding: 10px 25px; font-weight: bold; border-radius: 6px; border: none; cursor: pointer; transition: 0.3s;
            background-color: #333; color: var(--text-color);
        }
        .server-btn.active { background-color: #007bff; box-shadow: 0 0 10px #007bff; }
        .server-btn:hover { background-color: #555; }
        .server-btn.bunnystream-btn.active { background-color: #4CAF50; box-shadow: 0 0 10px #4CAF50; } 
        .server-btn.dood-btn.active { background-color: var(--accent-color); box-shadow: 0 0 10px var(--accent-color); }

        .season-section {
            background-color: var(--card-color); padding: 20px; border-radius: 12px; margin-top: 25px;
            text-align: right;
        }
        .season-header { font-size: 1.6em; color: var(--accent-color); margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .episode-button-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .episode-button { 
            padding: 8px 15px; background-color: #2a2a2a; color: var(--text-color); border-radius: 5px;
            text-decoration: none; transition: 0.2s; border: 1px solid #444; cursor: pointer;
        }
        .episode-button:hover { transform: scale(1.05); background-color: #444; }
        .episode-button.current-episode {
            background-color: var(--primary-color); border-color: var(--primary-color); font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
        }

        #details-container { margin-bottom: 30px; text-align: right; }
        .rating-box { display: flex; align-items: center; margin-bottom: 10px; }
        .rating-text { font-size: 1.2em; font-weight: bold; color: gold; margin-left: 10px; }
        .meta-info { display: flex; flex-wrap: wrap; gap: 30px; border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 15px; }
        .stars { font-size: 1.5em; color: #555; position: relative; direction: ltr; }
        .filled-stars { color: gold; overflow: hidden; position: absolute; top: 0; right: 0; height: 100%; }
        
    </style>
</head>
<body onload="document.body.classList.add('loaded')">

    <header>
        <a href="index.html" class="back-btn">&larr; الرئيسية</a>
        <h1 id="series-title">جاري تحميل المسلسل...</h1>
        <button id="logout-btn">تسجيل خروج</button>
    </header>

    <main>
        <div id="player-wrapper">
            <div id="player-container"></div>
        </div>
        
        <div id="server-buttons"></div>
        
        <div id="details-container">
            <div class="rating-box">
                <span class="rating-text"><span id="detail-rating-number">N/A</span>/10</span>
                <div class="stars">★★★★★<div class="filled-stars" id="filled-stars">★★★★★</div></div>
            </div>
            <div class="meta-info">
                <div><strong>سنة الإنتاج:</strong><span id="detail-year">N/A</span></div>
                <div><strong>بطولة:</strong><span id="detail-cast">N/A</span></div>
            </div>
            <h2>الوصف</h2>
            <p id="detail-description"></p>
        </div>
        
        <div id="seasons-container">
            <p id="loading-indicator" style="text-align: center;">جاري جلب المواسم والحلقات...</p>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBApoSZ-HXy9kd07tSJfuRdWkJcrbQVYf0", 
            authDomain: "qmove1.firebaseapp.com",
            projectId: "qmove1",
            storageBucket: "qmove1.appspot.com",
            messagingSenderId: "166464805371",
            appId: "1:166464805371:web:d65b0cb8b141e4b894935e"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const ADMIN_UID = 'rHIJXeazJiMsgAc1HDRO3vzFFV02'; 

        const seriesTitleElement = document.getElementById('series-title');
        const buttonsContainer = document.getElementById('server-buttons');
        const seasonsContainer = document.getElementById('seasons-container'); 
        const detailRatingNumber = document.getElementById('detail-rating-number');
        const filledStars = document.getElementById('filled-stars');

        function setStarRating(rating) {
            const widthPercentage = (rating / 10) * 100;
            detailRatingNumber.textContent = rating ? rating.toFixed(1) : 'N/A';
            filledStars.style.width = `${widthPercentage}%`;
        }
        
        // 🔥 دالة عرض الحلقة والمشغل مع الترجمة 🔥
        function playEpisode(episodeServers, subtitleUrl) {
            buttonsContainer.innerHTML = ''; 

            const serverOrder = ['bunnystream', 'dood']; 
            
            const availableServers = serverOrder
                .filter(name => episodeServers[name])
                .map(name => ({ name, url: episodeServers[name] }));

            const container = document.getElementById('player-container');

            if (availableServers.length === 0) {
                 container.innerHTML = '<div style="color:white; text-align:center; padding-top:20%; font-size:1.5em;">عفواً، لا توجد روابط مشاهدة لهذه الحلقة.</div>';
                 return;
            }
            
            // 🔥 دالة ذكية تحدد نوع المشغل، مع إضافة crossorigin لحل مشكلة الترجمة 🔥
            function renderPlayer(url) {
                if (subtitleUrl || url.includes('.mp4')) {
                    // إذا كان هناك ترجمة أو رابط مباشر، استخدم Video Tag مع خاصية crossorigin
                    container.innerHTML = `
                        <video crossorigin="anonymous" controls autoplay style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background-color: #000;">
                            <source src="${url}" type="video/mp4">
                            ${subtitleUrl ? `<track label="العربية" kind="subtitles" srclang="ar" src="${subtitleUrl}" default>` : ''}
                            متصفحك لا يدعم تشغيل الفيديو.
                        </video>
                    `;
                } else {
                    // خلاف ذلك، استخدم Iframe الافتراضي
                    container.innerHTML = `
                        <iframe src="${url}" frameborder="0" marginwidth="0" scrolling="no" allowfullscreen style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;"></iframe>
                    `;
                }
            }

            // تشغيل المشغل الأول افتراضياً
            renderPlayer(availableServers[0].url);
            
            // عرض الأزرار
            availableServers.forEach((server, index) => {
                const button = document.createElement('button');
                button.className = 'server-btn';
                
                let buttonText = server.name.toUpperCase();
                
                if (server.name === 'bunnystream') {
                    buttonText = 'المشغل الرئيسي (يدعم الترجمة)'; 
                    button.classList.add('bunnystream-btn'); 
                } else if (server.name === 'dood') {
                    buttonText = 'UQLOAD (سيرفر احتياطي)';
                    button.classList.add('dood-btn'); 
                }

                button.textContent = buttonText;

                if (index === 0) {
                    button.classList.add('active');
                }

                button.onclick = () => {
                    renderPlayer(server.url);
                    document.querySelectorAll('.server-btn').forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                };
                
                buttonsContainer.appendChild(button);
            });
        }

        function renderEpisodes(seriesId, seasonNumber, episodesElement) {
            db.collection(`series/${seriesId}/seasons/${seasonNumber}/episodes`).get()
                .then(snapshot => {
                    episodesElement.innerHTML = '';
                    if (snapshot.empty) {
                         episodesElement.innerHTML = 'لا توجد حلقات في هذا الموسم.';
                         return;
                    }
                    
                    let episodes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    episodes.sort((a, b) => parseInt(a.episodeNumber) - parseInt(b.episodeNumber)); 

                    episodes.forEach(episode => {
                        const button = document.createElement('a'); 
                        button.className = 'episode-button';
                        button.textContent = `حلقة ${episode.episodeNumber}: ${episode.title}`;
                        
                        button.onclick = (e) => {
                             e.preventDefault();
                             document.querySelectorAll('.episode-button').forEach(btn => btn.classList.remove('current-episode'));
                             button.classList.add('current-episode');

                             seriesTitleElement.textContent = `${seriesTitleElement.textContent.split(' - ')[0]} - الموسم ${seasonNumber} - حلقة ${episode.episodeNumber}`;
                             
                             // 🔥 تمرير رابط الترجمة لدالة التشغيل
                             playEpisode(episode.servers, episode.subtitle_url);
                        };
                        episodesElement.appendChild(button);
                    });
                });
        }
        
        function renderSeasons(seriesId, seasons) {
            seasonsContainer.innerHTML = ''; 
            seasons.forEach(season => {
                const section = document.createElement('div');
                section.className = 'season-section';
                section.innerHTML = `
                    <h3 class="season-header">الموسم ${season.seasonNumber}</h3>
                    <div id="episodes-grid-${season.seasonNumber}" class="episode-button-grid">
                        جاري جلب الحلقات...
                    </div>
                `;
                seasonsContainer.appendChild(section);
                
                const episodesElement = document.getElementById(`episodes-grid-${season.seasonNumber}`);
                renderEpisodes(seriesId, season.seasonNumber, episodesElement);
            });

             if (seasons.length > 0) {
                 const firstSeasonNumber = seasons[0].seasonNumber;
                 db.collection(`series/${seriesId}/seasons/${firstSeasonNumber}/episodes`).orderBy('episodeNumber', 'asc').limit(1).get()
                     .then(snapshot => {
                         if (!snapshot.empty) {
                             const firstEpisode = snapshot.docs[0].data();
                             const firstEpisodeId = snapshot.docs[0].id;

                             seriesTitleElement.textContent = `${seriesTitleElement.textContent.split(' - ')[0]} - الموسم ${firstSeasonNumber} - حلقة ${firstEpisode.episodeNumber}`;
                             
                             // 🔥 تمرير رابط الترجمة للحلقة الأولى
                             playEpisode(firstEpisode.servers, firstEpisode.subtitle_url);

                             setTimeout(() => {
                                 const firstButton = document.querySelector(`#episodes-grid-${firstSeasonNumber} .episode-button`);
                                 if (firstButton) {
                                     firstButton.classList.add('current-episode');
                                 }
                             }, 1000);
                         }
                     });
             }
        }

        function fetchSeriesData() {
            const urlParams = new URLSearchParams(window.location.search);
            const seriesId = urlParams.get('seriesId');

            if (!seriesId) {
                seriesTitleElement.textContent = 'خطأ: لم يتم تحديد المسلسل.';
                return;
            }

            db.collection('series').doc(seriesId).get()
                .then(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        seriesTitleElement.textContent = data.title;
                        document.getElementById('detail-year').textContent = data.releaseYear || 'N/A';
                        document.getElementById('detail-cast').textContent = data.cast || 'N/A';
                        document.getElementById('detail-description').textContent = data.description || 'لم يتم إضافة وصف.';
                        setStarRating(data.rating || 0);

                        return db.collection(`series/${seriesId}/seasons`).orderBy('seasonNumber', 'asc').get();
                    } else {
                        throw new Error('المسلسل غير موجود في قاعدة البيانات.');
                    }
                })
                .then(snapshot => {
                    const seasons = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderSeasons(seriesId, seasons);
                })
                .catch(error => {
                    seriesTitleElement.textContent = `خطأ في التحميل: ${error.message}`;
                    console.error(error);
                });
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                fetchSeriesData();
                document.getElementById('logout-btn').addEventListener('click', () => {
                    auth.signOut().then(() => {
                        window.location.href = './login.html';
                    });
                });
            } else {
                window.location.href = './login.html';
            }
        });
    </script>
</body>
</html>
