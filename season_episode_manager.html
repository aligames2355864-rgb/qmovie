<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المواسم والحلقات</title>
    <style>
        /* 🔥🔥 الـ CSS الأساسي 🔥🔥 */
        :root {
            --bg-color: #0d0d0d; 
            --card-color: #1a1a1a; 
            --text-color: #e0e0e0; 
            --accent-color: #e50914; 
            --primary-color: #007bff;
        }
        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #141414, #000);
            color: var(--text-color);
            padding: 20px;
            margin: 0;
        }
        .container {
            background-color: var(--card-color);
            padding: 30px; border-radius: 12px; max-width: 900px; margin: 20px auto;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }
        h1 { color: var(--accent-color); margin-bottom: 5px; text-align: center; }
        h2 { color: var(--text-color); font-size: 1.5em; margin-top: 20px; border-bottom: 1px solid #333; padding-bottom: 5px; text-align: right; }
        
        /* زر العودة */
        .back-btn { display: block; margin-bottom: 20px; text-align: right; color: var(--primary-color); text-decoration: none; }
        
        /* تصميم الأزرار الرئيسية */
        .action-group { margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; }
        .action-group button, .episode-actions a.action-btn-small { 
            padding: 10px 15px; font-weight: bold; border-radius: 5px; border: none; cursor: pointer;
            background-color: var(--primary-color); color: white; transition: 0.3s;
            text-decoration: none;
        }
        
        /* قائمة المواسم */
        #seasons-list { list-style: none; padding: 0; }
        #seasons-list > li {
            background-color: #222; padding: 15px; margin-bottom: 15px; border-radius: 8px;
        }
        .season-header { display: flex; justify-content: space-between; align-items: center; font-size: 1.3em; margin-bottom: 10px; }
        .season-actions a, .season-actions button { 
             margin-left: 10px; font-size: 0.9em; padding: 8px 12px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer;
        }
        .season-actions .add-episode-btn { background-color: #4CAF50; color: white; text-decoration: none; }
        .season-actions .delete-season-btn { background-color: var(--accent-color); color: white; }

        /* قائمة الحلقات */
        .episodes-list { list-style: none; padding-right: 0; margin-top: 10px; }
        .episodes-list > li { 
            background-color: #333; margin-bottom: 8px; padding: 10px; border-radius: 5px;
            display: block; 
        }
        .episode-actions button, .episode-actions a { 
            padding: 5px 10px; font-size: 0.9em; margin-left: 5px; cursor: pointer;
            border-radius: 4px; color: white; border: none; text-decoration: none;
        }
        .episode-actions .quick-edit-btn { background-color: #ff9800; } 
        .episode-actions .edit-btn { background-color: #555; } 
        .episode-actions .delete-btn { background-color: var(--accent-color); }
        
        /* تصميم حقول التعديل السريع */
        .quick-edit-panel {
            display: none; background: #1a1a1a; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px dashed #555;
        }
        .quick-edit-panel input {
            flex: 1; padding: 10px; border-radius: 4px; border: 1px solid #444; background: #000; color: white; font-family: inherit;
        }
    </style>
</head>
<body>
    
    <a href="series_list.html" class="back-btn">&larr; العودة لقائمة المسلسلات</a>

    <div class="container">
        <h1 id="series-name">... جاري تحميل المسلسل</h1>
        <p id="series-id-display" style="font-size: 0.8em; color: #888; text-align: center;"></p>
        
        <hr style="border-color: #333; margin: 25px 0;">

        <h2>إدارة المواسم والحلقات</h2>
        
        <div class="action-group">
            <button id="add-season-btn" onclick="promptAddSeason()">+ إضافة موسم جديد</button>
        </div>

        <ul id="seasons-list">
            <li id="loading-indicator">جاري جلب المواسم...</li>
        </ul>
        
        <div id="error-message" style="color: var(--accent-color); text-align: center; margin-top: 20px;"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        // ===============================================
        //  إعدادات Firebase 
        // ===============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBApoSZ-HXy9kd07tSJfuRdWkJcrbQVYf0", 
            authDomain: "qmove1.firebaseapp.com",
            projectId: "qmove1",
            storageBucket: "qmove1.appspot.com",
            messagingSenderId: "166464805371",
            appId: "1:166464805371:web:d65b0cb8b141e4b894935e"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const ADMIN_UID = 'rHIJXeazJiMsgAc1HDRO3vzFFV02'; 

        const urlParams = new URLSearchParams(window.location.search);
        const seriesId = urlParams.get('seriesId');
        
        const seriesNameElement = document.getElementById('series-name');
        const seasonsListElement = document.getElementById('seasons-list');
        const errorMessageElement = document.getElementById('error-message');


        // ===============================================
        //  دوآل الإضافة والتعديل والحذف
        // ===============================================
        
        function deleteEpisode(seriesId, seasonNumber, episodeId, episodeTitle) {
            if (confirm(`تأكيد حذف الحلقة ${episodeTitle}؟`)) {
                db.collection(`series/${seriesId}/seasons/${seasonNumber}/episodes`).doc(episodeId).delete()
                    .then(() => { fetchSeasons(seriesId); })
                    .catch(error => { errorMessageElement.textContent = `فشل الحذف: ${error.message}`; });
            }
        }
        
        function deleteSeason(seriesId, seasonNumber) {
            if (confirm(`تحذير! هل أنت متأكد من حذف الموسم ${seasonNumber}؟ يجب أن تحذف جميع الحلقات يدوياً أولاً!`)) {
                db.collection(`series/${seriesId}/seasons`).doc(seasonNumber).delete()
                    .then(() => { fetchSeasons(seriesId); })
                    .catch(error => { errorMessageElement.textContent = `فشل الحذف: ${error.message}`; });
            }
        }

        function promptAddSeason() {
            const seasonNumber = (prompt("أدخل رقم الموسم الجديد (مثال: 1, 2):") || '').trim();
            if (!seasonNumber) return;
            
            db.collection(`series/${seriesId}/seasons`).doc(seasonNumber).set({
                seasonNumber: seasonNumber,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => { fetchSeasons(seriesId); }).catch(error => {
                alert("فشل إنشاء الموسم. تأكد أنك لم تكرر رقم الموسم.");
            });
        }

        // 🔥🔥🔥 دوآل التعديل السريع (الجديدة والمُصلحة) 🔥🔥🔥
        
        // إظهار وإخفاء لوحة التعديل السريع (تم إضافة seasonNumber لمنع التضارب)
        function toggleQuickEdit(seasonNumber, episodeId) {
            const panel = document.getElementById(`quick-edit-${seasonNumber}-${episodeId}`);
            if(panel) {
                panel.style.display = (panel.style.display === 'none' || panel.style.display === '') ? 'block' : 'none';
            }
        }

        // حفظ الروابط السريعة في قاعدة البيانات مباشرة
        function saveQuickLinks(seriesId, seasonNumber, episodeId) {
            const bunnyLink = document.getElementById(`bunny-${seasonNumber}-${episodeId}`).value.trim();
            const doodLink = document.getElementById(`dood-${seasonNumber}-${episodeId}`).value.trim();
            const statusSpan = document.getElementById(`status-${seasonNumber}-${episodeId}`);
            
            statusSpan.textContent = "جاري الحفظ...";
            statusSpan.style.color = "#ff9800"; // برتقالي
            
            db.collection(`series/${seriesId}/seasons/${seasonNumber}/episodes`).doc(episodeId).update({
                "servers.bunnystream": bunnyLink,
                "servers.dood": doodLink
            }).then(() => {
                statusSpan.textContent = "تم الحفظ بنجاح ✓";
                statusSpan.style.color = "#4CAF50"; // أخضر
                setTimeout(() => { statusSpan.textContent = ""; }, 2000);
            }).catch(error => {
                statusSpan.textContent = "حدث خطأ!";
                statusSpan.style.color = "#e50914"; // أحمر
                console.error(error);
            });
        }

        // حفظ الروابط عند الضغط على زر Enter في الكيبورد
        function handleEnter(event, seriesId, seasonNumber, episodeId) {
            if (event.key === 'Enter') {
                saveQuickLinks(seriesId, seasonNumber, episodeId);
            }
        }


        // ===============================================
        //  دوآل العرض (Rendering)
        // ===============================================

        // 🔥 يعرض الحلقات داخل الموسم
        function renderEpisodes(seriesId, seasonNumber) {
            const episodesListElement = document.getElementById(`episodes-list-${seasonNumber}`);
            episodesListElement.innerHTML = 'جاري التحميل...';

            db.collection(`series/${seriesId}/seasons/${seasonNumber}/episodes`).get()
                .then(snapshot => {
                    episodesListElement.innerHTML = '';
                    if (snapshot.empty) {
                         episodesListElement.innerHTML = '<li>لا توجد حلقات.</li>';
                         return;
                    }
                    
                    let episodes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    episodes.sort((a, b) => parseInt(a.episodeNumber) - parseInt(b.episodeNumber)); 

                    episodes.forEach(episode => {
                        const li = document.createElement('li');
                        
                        // استخراج الروابط الحالية بأمان تام
                        const bunnyUrl = (episode.servers && episode.servers.bunnystream) ? episode.servers.bunnystream : '';
                        const doodUrl = (episode.servers && episode.servers.dood) ? episode.servers.dood : '';

                        // 🔥 تم تحديث المعرفات (IDs) لتشمل رقم الموسم لكي لا تتضارب الحلقات 🔥
                        li.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span>الحلقة ${episode.episodeNumber}: ${episode.title}</span>
                                <div class="episode-actions">
                                    <button class="quick-edit-btn" onclick="toggleQuickEdit('${seasonNumber}', '${episode.id}')">تعديل سريع للروابط</button>
                                    
                                    <a href="season_episode_form.html?seriesId=${seriesId}&seasonNum=${seasonNumber}&episodeId=${episode.id}" class="edit-btn">إعدادات متقدمة</a>
                                    <button class="delete-btn" onclick="deleteEpisode('${seriesId}', '${seasonNumber}', '${episode.id}', 'الحلقة ${episode.episodeNumber}')">حذف</button>
                                </div>
                            </div>

                            <div id="quick-edit-${seasonNumber}-${episode.id}" class="quick-edit-panel">
                                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                                    <input type="text" id="bunny-${seasonNumber}-${episode.id}" placeholder="رابط Bunnystream هنا..." value="${bunnyUrl}" onkeypress="handleEnter(event, '${seriesId}', '${seasonNumber}', '${episode.id}')">
                                    <input type="text" id="dood-${seasonNumber}-${episode.id}" placeholder="رابط Dood هنا..." value="${doodUrl}" onkeypress="handleEnter(event, '${seriesId}', '${seasonNumber}', '${episode.id}')">
                                </div>
                                <button onclick="saveQuickLinks('${seriesId}', '${seasonNumber}', '${episode.id}')" style="background-color: #4CAF50; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">حفظ الروابط</button>
                                <span id="status-${seasonNumber}-${episode.id}" style="margin-right: 15px; font-weight: bold;"></span>
                            </div>
                        `;
                        episodesListElement.appendChild(li);
                    });
                })
                .catch(error => {
                     errorMessageElement.textContent = `خطأ في جلب الحلقات: ${error.message}`;
                });
        }
        
        // 🔥 يعرض قائمة المواسم
        function renderSeasons(seriesId, seasons) {
            seasonsListElement.innerHTML = '';
            if (seasons.length === 0) {
                 seasonsListElement.innerHTML = '<li>لم يتم إضافة مواسم بعد.</li>';
                 return;
            }

            seasons.forEach(season => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <div class="season-header">
                        <span>الموسم ${season.seasonNumber}</span>
                        <div class="season-actions">
                            <button onclick="bulkAddEpisodes('${seriesId}', '${season.seasonNumber}')" style="background-color: #ff9800; color: white;">+ إضافة حلقات دفعة واحدة</button>
                            <a href="season_episode_form.html?seriesId=${seriesId}&seasonNum=${season.seasonNumber}" class="add-episode-btn">+ إضافة حلقة</a>
                            <button class="delete-season-btn" onclick="deleteSeason('${seriesId}', '${season.seasonNumber}')">حذف الموسم</button>
                        </div>
                    </div>
                    <ul id="episodes-list-${season.seasonNumber}" class="episodes-list">
                        جاري جلب الحلقات...
                    </ul>
                `;
                seasonsListElement.appendChild(li);
                renderEpisodes(seriesId, season.seasonNumber);
            });
        }

        // 🔥 دالة إضافة حلقات دفعة واحدة
        async function bulkAddEpisodes(seriesId, seasonNumber) {
            const countStr = prompt("كم عدد الحلقات التي تريد إضافتها دفعة واحدة؟ (مثال: 25)");
            if (!countStr) return; 

            const count = parseInt(countStr);
            if (isNaN(count) || count <= 0) {
                alert("الرجاء إدخال رقم صحيح أكبر من الصفر.");
                return;
            }

            if (!confirm(`هل أنت متأكد أنك تريد إنشاء ${count} حلقة فارغة للموسم ${seasonNumber}؟`)) return;

            errorMessageElement.textContent = "جاري إنشاء الحلقات، يرجى الانتظار...";

            try {
                const snapshot = await db.collection(`series/${seriesId}/seasons/${seasonNumber}/episodes`).get();
                let startNumber = 1;
                
                if (!snapshot.empty) {
                    let maxNum = 0;
                    snapshot.docs.forEach(doc => {
                        const epNum = parseInt(doc.data().episodeNumber);
                        if (!isNaN(epNum) && epNum > maxNum) maxNum = epNum;
                    });
                    startNumber = maxNum + 1; 
                }

                const batch = db.batch();
                
                for (let i = 0; i < count; i++) {
                    const currentEpNum = startNumber + i;
                    const docRef = db.collection(`series/${seriesId}/seasons/${seasonNumber}/episodes`).doc(currentEpNum.toString());
                    
                    batch.set(docRef, {
                        episodeNumber: currentEpNum,
                        title: `الحلقة ${currentEpNum}`,
                        description: "",
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        servers: { bunnystream: "", dood: "" },
                        subtitle_url: ""
                    });
                }

                await batch.commit();
                errorMessageElement.textContent = "";
                alert(`تمت الإضافة بنجاح! يمكنك الآن استخدام "تعديل سريع" لوضع الروابط.`);
                fetchSeasons(seriesId); 

            } catch (error) {
                errorMessageElement.textContent = `حدث خطأ: ${error.message}`;
            }
        }

        function fetchSeasons(seriesId) {
            db.collection(`series/${seriesId}/seasons`).orderBy('seasonNumber', 'asc').get()
                .then(snapshot => {
                    const seasons = snapshot.docs.map(doc => doc.data());
                    renderSeasons(seriesId, seasons);
                })
                .catch(error => { errorMessageElement.textContent = `خطأ في جلب المواسم: ${error.message}`; });
        }

        // ===============================================
        //  نقطة البداية
        // ===============================================
        if (seriesId) {
            db.collection('series').doc(seriesId).get()
                .then(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        seriesNameElement.textContent = `إدارة: ${data.title}`;
                        document.getElementById('series-id-display').textContent = `ID: ${seriesId}`;
                        fetchSeasons(seriesId);
                    } else {
                        seriesNameElement.textContent = 'المسلسل غير موجود.';
                    }
                });
        } else {
            seriesNameElement.textContent = 'خطأ: لم يتم تحديد المسلسل.';
        }

        auth.onAuthStateChanged(user => {
            if (!user || user.uid !== ADMIN_UID) {
                window.location.href = './login.html';
            }
        });

    </script>
</body>
</html>
