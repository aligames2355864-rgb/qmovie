<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>q movie - تسجيل الدخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #e50914;
            --dark-bg: #0f0f0f;
            --glass-bg: rgba(28, 28, 28, 0.85);
            --text-light: #ffffff;
            --text-muted: #b3b3b3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://assets.nflxext.com/ffe/siteui/vlv3/f8ca3614-1734-4f03-97d3-5b4b12f6a623/903673c0-08c3-4d4b-a2ed-44ec069c9b56/IQ-ar-20220523-popsignuptwoweeks-perspective_alpha_website_large.jpg');
            background-size: cover;
            background-position: center;
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: var(--glass-bg);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 14px 45px 14px 15px;
            border-radius: 6px;
            border: none;
            background-color: #333;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: background 0.3s, ring 0.3s;
        }

        input:focus {
            background-color: #454545;
            outline: 2px solid var(--primary-red);
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            background-color: var(--primary-red);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #ff0f1b;
            transform: translateY(-2px);
        }

        #error-message {
            background: rgba(229, 9, 20, 0.2);
            border-right: 4px solid var(--primary-red);
            padding: 10px;
            font-size: 14px;
            margin-top: 15px;
            display: none;
            text-align: right;
        }

        .footer-links {
            text-align: center;
            margin-top: 25px;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: bold;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>تسجيل الدخول</h1>
        <form id="form">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="كلمة المرور" required>
            </div>
            <button type="submit">دخول</button>
        </form>
        <p id="error-message"></p>
        <div class="footer-links">
            <p>لا تمتلك حساباً بعد؟ <a href="./register.html">انضم إلينا الآن</a></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBApoSZ-HXy9kd07tSJfuRdWkJcrbQVYf0",
          authDomain: "qmove1.firebaseapp.com",
          projectId: "qmove1",
          storageBucket: "qmove1.firebasestorage.app",
          messagingSenderId: "166464805371",
          appId: "1:166464805371:web:d65b0cb8b141e4b894935e",
          measurementId: "G-3EXSHD3GN8"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const loginForm = document.getElementById('form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault(); 
            errorMessage.style.display = 'none'; 

            auth.signInWithEmailAndPassword(emailInput.value, passwordInput.value)
                .then(() => {
                    window.location.href = './index.html';
                })
                .catch(() => {
                    errorMessage.textContent = 'خطأ في البريد الإلكتروني أو كلمة المرور. يرجى التثبت من البيانات.';
                    errorMessage.style.display = 'block';
                });
        });
    </script>
</body>
</html>
