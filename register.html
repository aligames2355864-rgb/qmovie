<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q Movie - إنشاء حساب جديد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(0, 0, 0, 0.75);
            --text-color: #ffffff;
            --text-muted: #b3b3b3;
            --accent-color: #e50914; 
            --input-bg: #333333;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            /* خلفية سينمائية متدرجة */
            background: radial-gradient(circle at center, #2b2b2b 0%, #000000 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        #register-form {
            background-color: var(--card-bg);
            padding: 50px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
            box-sizing: border-box;
        }

        h1 {
            text-align: right;
            color: var(--text-color);
            margin-bottom: 30px;
            font-size: 32px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 20px;
            border-radius: 4px;
            border: none;
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            box-sizing: border-box; 
            transition: background-color 0.3s ease;
        }

        input:focus {
            outline: none;
            background-color: #454545;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            border: none;
            border-radius: 4px;
            background-color: var(--accent-color);
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        button:hover { 
            background-color: #f6121d; 
        }

        #error-message {
            color: var(--accent-color);
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            display: none; 
        }

        .link {
            text-align: center;
            margin-top: 30px;
            color: var(--text-muted);
            font-size: 16px;
        }

        .link a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .link a:hover { 
            text-decoration: underline; 
        }
    </style>
</head>
<body>

    <div id="register-form">
        <h1>إنشاء حساب</h1>
        <form id="form">
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <input type="password" id="confirm-password" placeholder="تأكيد كلمة المرور" required>
            <button type="submit">متابعة</button>
        </form>
        <p id="error-message"></p>
        <div class="link">
            <p>لديك حساب بالفعل؟ <a href="./login.html">تسجيل الدخول</a></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        // ================ (1) إعدادات Firebase ================
        const firebaseConfig = {
          apiKey: "AIzaSyBApoSZ-HXy9kd07tSJfuRdWkJcrbQVYf0",
          authDomain: "qmove1.firebaseapp.com",
          projectId: "qmove1",
          storageBucket: "qmove1.firebasestorage.app",
          messagingSenderId: "166464805371",
          appId: "1:166464805371:web:d65b0cb8b141e4b894935e",
          measurementId: "G-3EXSHD3GN8"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ================ (2) برمجة النموذج ================
        const registerForm = document.getElementById('form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const errorMessage = document.getElementById('error-message');

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault(); 
            const email = emailInput.value;
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            errorMessage.style.display = 'none';

            // التحقق من تطابق كلمات المرور (لغة فصحى)
            if (password !== confirmPassword) {
                errorMessage.textContent = 'كلمات المرور غير متطابقة.';
                errorMessage.style.display = 'block';
                return; 
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    window.location.href = './index.html';
                })
                .catch((error) => {
                    // رسائل خطأ احترافية
                    if (error.code === 'auth/email-already-in-use') {
                        errorMessage.textContent = 'البريد الإلكتروني مستخدم بالفعل.';
                    } else if (error.code === 'auth/weak-password') {
                        errorMessage.textContent = 'كلمة المرور ضعيفة (يجب أن تتكون من 6 أحرف على الأقل).';
                    } else {
                        errorMessage.textContent = 'حدث خطأ. يرجى المحاولة مرة أخرى.';
                    }
                    errorMessage.style.display = 'block';
                });
        });
    </script>
</body>
</html>
