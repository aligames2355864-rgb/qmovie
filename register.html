<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q Movie - إنشاء حساب جديد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: #e50914;
            --accent-glow: rgba(229, 9, 20, 0.5);
            --text-color: #ffffff;
            --text-muted: #b3b3b3;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.9)), 
                        url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1920&auto=format&fit=crop') center/cover fixed;
            color: var(--text-color);
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 50px 50px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
            transform: translateY(0);
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: right;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 35px;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 22px 16px 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .input-group label {
            position: absolute;
            right: 16px;
            top: 18px;
            color: var(--text-muted);
            font-size: 16px;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus,
        .input-group input:valid {
            border-color: var(--accent-color);
            outline: none;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.2);
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: 6px;
            font-size: 12px;
            color: var(--accent-color);
            font-weight: 700;
        }

        button {
            width: 100%;
            padding: 18px;
            font-size: 20px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 800;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #e50914, #b20710);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        #error-message {
            background: rgba(229, 9, 20, 0.1);
            border-right: 4px solid var(--accent-color);
            color: #ff6b6b;
            padding: 12px;
            border-radius: 4px;
            text-align: right;
            margin-top: 20px;
            font-size: 14px;
            display: none;
        }

        .link {
            text-align: center;
            margin-top: 30px;
            color: var(--text-muted);
            font-size: 16px;
        }

        .link a {
            color: white;
            text-decoration: none;
            font-weight: 700;
            margin-right: 5px;
            transition: color 0.3s ease;
        }

        .link a:hover { 
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>إنشاء حساب</h1>
        <form id="form">
            <div class="input-group">
                <input type="email" id="email" required autocomplete="off">
                <label>البريد الإلكتروني</label>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" required>
                <label>كلمة المرور</label>
            </div>

            <div class="input-group">
                <input type="password" id="confirm-password" required>
                <label>تأكيد كلمة المرور</label>
            </div>

            <button type="submit">متابعة وتسجيل</button>
        </form>
        <div id="error-message"></div>
        <div class="link">
            <span>هل لديك حساب بالفعل؟</span><a href="./login.html">تسجيل الدخول</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBApoSZ-HXy9kd07tSJfuRdWkJcrbQVYf0",
          authDomain: "qmove1.firebaseapp.com",
          projectId: "qmove1",
          storageBucket: "qmove1.firebasestorage.app",
          messagingSenderId: "166464805371",
          appId: "1:166464805371:web:d65b0cb8b141e4b894935e",
          measurementId: "G-3EXSHD3GN8"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const registerForm = document.getElementById('form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const errorMessage = document.getElementById('error-message');

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault(); 
            const email = emailInput.value;
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            errorMessage.style.display = 'none';

            if (password !== confirmPassword) {
                errorMessage.textContent = 'عذراً، كلمات المرور غير متطابقة.';
                errorMessage.style.display = 'block';
                return; 
            }

            // تأثير تحميل
            const btn = registerForm.querySelector('button');
            const originalBtnText = btn.textContent;
            btn.textContent = 'جاري إنشاء الحساب...';
            btn.style.opacity = '0.8';

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    window.location.href = './index.html';
                })
                .catch((error) => {
                    if (error.code === 'auth/email-already-in-use') {
                        errorMessage.textContent = 'البريد الإلكتروني مسجل مسبقاً في النظام.';
                    } else if (error.code === 'auth/weak-password') {
                        errorMessage.textContent = 'يرجى استخدام كلمة مرور أقوى (6 أحرف على الأقل).';
                    } else {
                        errorMessage.textContent = 'حدث خطأ غير متوقع. يرجى المحاولة لاحقاً.';
                    }
                    errorMessage.style.display = 'block';
                    btn.textContent = originalBtnText;
                    btn.style.opacity = '1';
                });
        });
    </script>
</body>
</html>
